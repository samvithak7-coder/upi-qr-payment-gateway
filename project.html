<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI QR Payment Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .payment-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .generate-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .generate-btn:active {
            transform: translateY(0);
        }
        
        .qr-container {
            display: none;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        .qr-container.active {
            display: block;
        }
        
        #qrcode {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .payment-info {
            text-align: left;
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }
        
        .payment-info p {
            margin: 8px 0;
            color: #555;
            font-size: 14px;
        }
        
        .payment-info strong {
            color: #333;
        }
        
        .download-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: #28a745;
            color: white;
            transition: background 0.3s;
        }
        
        .download-btn:hover {
            background: #218838;
        }
        
        .new-payment-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: white;
            color: #667eea;
            transition: all 0.3s;
        }
        
        .new-payment-btn:hover {
            background: #667eea;
            color: white;
        }

        .error {
            border-color: #ff4444 !important;
        }
        
        .error-message {
            color: #ff4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .instruction {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <h2>💳 UPI QR Payment</h2>
        
        <form id="paymentForm">
            <div class="form-group">
                <label for="merchantName">Merchant Name</label>
                <input type="text" id="merchantName" placeholder="Enter merchant name" required>
                <span class="error-message" id="nameError">Please enter merchant name</span>
            </div>
            
            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" id="amount" placeholder="Enter amount" min="1" required>
                <span class="error-message" id="amountError">Please enter a valid amount</span>
            </div>
            
            <div class="form-group">
                <label for="upiId">Merchant UPI ID</label>
                <input type="text" id="upiId" placeholder="e.g., merchant@paytm" required>
                <span class="error-message" id="upiError">Please enter a valid UPI ID</span>
            </div>
            
            <div class="form-group">
                <label for="transactionNote">Transaction Note (Optional)</label>
                <input type="text" id="transactionNote" placeholder="Payment for..." value="Payment">
            </div>
            
            <button type="button" class="generate-btn" onclick="generateQRCode()">
                🔄 Generate QR Code
            </button>
        </form>
        
        <div class="qr-container" id="qrContainer">
            <h3 style="color: #333; margin-bottom: 10px;">📱 Scan to Pay</h3>
            <div id="qrcode"></div>
            
            <div class="payment-info">
                <p><strong>Merchant:</strong> <span id="displayName"></span></p>
                <p><strong>Amount:</strong> ₹<span id="displayAmount"></span></p>
                <p><strong>UPI ID:</strong> <span id="displayUPI"></span></p>
                <p><strong>Note:</strong> <span id="displayNote"></span></p>
            </div>
            
            <p class="instruction">Scan this QR code with any UPI app<br>(GPay, PhonePe, Paytm, etc.)</p>
            
            <button class="download-btn" onclick="downloadQRCode()">
                ⬇️ Download QR Code
            </button>
            
            <button class="new-payment-btn" onclick="resetForm()">
                ➕ Create New Payment
            </button>
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        let qrcodeInstance = null;

        function validateForm() {
            let isValid = true;
            
            const name = document.getElementById('merchantName').value.trim();
            const amount = document.getElementById('amount').value;
            const upiId = document.getElementById('upiId').value.trim();
            
            // Reset errors
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
            
            if (name === '') {
                document.getElementById('merchantName').classList.add('error');
                document.getElementById('nameError').style.display = 'block';
                isValid = false;
            }
            
            if (amount === '' || amount <= 0) {
                document.getElementById('amount').classList.add('error');
                document.getElementById('amountError').style.display = 'block';
                isValid = false;
            }
            
            const upiPattern = /^[\w.-]+@[\w.-]+$/;
            if (!upiPattern.test(upiId)) {
                document.getElementById('upiId').classList.add('error');
                document.getElementById('upiError').style.display = 'block';
                isValid = false;
            }
            
            return isValid;
        }
        
        function generateQRCode() {
            if (!validateForm()) {
                alert('Please fill all required fields correctly');
                return;
            }
            
            const merchantName = document.getElementById('merchantName').value.trim();
            const amount = document.getElementById('amount').value;
            const upiId = document.getElementById('upiId').value.trim();
            const note = document.getElementById('transactionNote').value.trim() || 'Payment';
            
            // Build UPI string
            const upiString = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(merchantName)}&am=${amount}&tn=${encodeURIComponent(note)}&cu=INR`;
            
            // Clear previous QR code
            document.getElementById('qrcode').innerHTML = '';
            
            // Generate new QR code
            qrcodeInstance = new QRCode(document.getElementById('qrcode'), {
                text: upiString,
                width: 256,
                height: 256,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            
            // Display payment info
            document.getElementById('displayName').textContent = merchantName;
            document.getElementById('displayAmount').textContent = amount;
            document.getElementById('displayUPI').textContent = upiId;
            document.getElementById('displayNote').textContent = note;
            
            // Show QR container
            document.getElementById('qrContainer').classList.add('active');
            
            // Scroll to QR code
            document.getElementById('qrContainer').scrollIntoView({ behavior: 'smooth' });
        }
        
        function downloadQRCode() {
            const qrImage = document.querySelector('#qrcode img');
            if (qrImage) {
                const canvas = document.querySelector('#qrcode canvas');
                const link = document.createElement('a');
                link.download = `UPI_Payment_QR_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            }
        }
        
        function resetForm() {
            document.getElementById('paymentForm').reset();
            document.getElementById('qrContainer').classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
